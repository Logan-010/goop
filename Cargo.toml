[package]
name = "goop"
version = "0.1.0"
edition = "2024"
authors = ["Logan-010"]
description = "IPFS implementation in Rust."

[dependencies]
beetswap = "0.5.0"
blockstore = { version = "0.8.0", features = ["redb"] }
clap = { version = "4.5.54", features = ["derive", "env"] }
color-eyre = "0.6.5"
directories = "6.0.0"
libp2p = { version = "0.56.0", features = ["dcutr", "relay", "tcp", "quic", "noise", "yamux", "tokio", "macros", "ping", "identify", "autonat", "kad", "websocket", "mdns", "dns", "serde", "upnp", "rsa"] }
rand = "0.8.5"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tokio = { version = "1.49.0", features = ["rt-multi-thread", "macros", "fs", "signal"] }
tokio-util = { version = "0.7.18", default-features = false }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
debug = false
incremental = false
rpath = false
overflow-checks = false
